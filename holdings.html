<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Holdings Overview</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0b1120;
            color: #e5e7eb;
            margin: 0;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
        }
        th, td {
            padding: 0.6rem;
            border-bottom: 1px solid #1f2937;
        }
        th {
            background: #111827;
        }
        tr:nth-child(even) {
            background: #020617;
        }
        input {
            width: 90%;
            padding: 4px;
            background: #1f2937;
            border: 1px solid #374151;
            color: #e5e7eb;
        }
        .total {
            font-weight: bold;
            background: #111827;
        }
    </style>
</head>
<body>

<h1>My Holdings (Editable)</h1>

<h2>Stocks</h2>
<table id="stocksTable">
    <thead>
        <tr>
            <th>Ticker</th>
            <th>Shares</th>
            <th>Price</th>
            <th>Total Value</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td><input value="AAPL"></td>
            <td><input value="50" class="shares"></td>
            <td><input value="190.25" class="price"></td>
            <td class="value">$0.00</td>
        </tr>
        <tr>
            <td><input value="MSFT"></td>
            <td><input value="30" class="shares"></td>
            <td><input value="420.10" class="price"></td>
            <td class="value">$0.00</td>
        </tr>
    </tbody>
    <tfoot>
        <tr class="total">
            <td colspan="3">Total Stock Value</td>
            <td id="stocksTotal">$0.00</td>
        </tr>
    </tfoot>
</table>

<h2>ETFs</h2>
<table id="etfsTable">
    <thead>
        <tr>
            <th>Ticker</th>
            <th>Shares</th>
            <th>Price</th>
            <th>Total Value</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td><input value="VTI"></td>
            <td><input value="60" class="shares"></td>
            <td><input value="260.40" class="price"></td>
            <td class="value">$0.00</td>
        </tr>
        <tr>
            <td><input value="SCHD"></td>
            <td><input value="100" class="shares"></td>
            <td><input value="78.50" class="price"></td>
            <td class="value">$0.00</td>
        </tr>
    </tbody>
    <tfoot>
        <tr class="total">
            <td colspan="3">Total ETF Value</td>
            <td id="etfsTotal">$0.00</td>
        </tr>
    </tfoot>
</table>

<script>
function recalc(tableId, totalId) {
    const rows = document.querySelectorAll(`#${tableId} tbody tr`);
    let total = 0;

    rows.forEach(row => {
        const shares = parseFloat(row.querySelector(".shares").value) || 0;
        const price = parseFloat(row.querySelector(".price").value) || 0;
        const value = shares * price;
        row.querySelector(".value").textContent = "$" + value.toFixed(2);
        total += value;
    });

    document.getElementById(totalId).textContent = "$" + total.toFixed(2);
}

document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", () => {
        recalc("stocksTable", "stocksTotal");
        recalc("etfsTable", "etfsTotal");
    });
});

// Initial calculation
recalc("stocksTable", "stocksTotal");
recalc("etfsTable", "etfsTotal");
</script>

</body>
</html>
