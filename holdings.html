<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Holdings Overview</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0b1120;
            color: #e5e7eb;
            margin: 0;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
        }
        .section-title {
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
            color: #38bdf8;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }
        th, td {
            padding: 0.6rem 0.4rem;
            border-bottom: 1px solid #1f2937;
            text-align: left;
        }
        th {
            background: #111827;
            font-weight: 600;
        }
        tr:nth-child(even) {
            background: #020617;
        }
        .total-row {
            font-weight: 600;
            background: #111827;
        }
    </style>
</head>
<body>
    <h1>My Largest Holdings</h1>

    <div class="section-title">Stocks</div>
    <table id="stocksTable">
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Shares</th>
                <th>Price</th>
                <th>Total Value</th>
            </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="3">Total Stock Value</td>
                <td id="stocksTotal">$0.00</td>
            </tr>
        </tfoot>
    </table>

    <div class="section-title">ETFs</div>
    <table id="etfsTable">
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Shares</th>
                <th>Price</th>
                <th>Total Value</th>
            </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="3">Total ETF Value</td>
                <td id="etfsTotal">$0.00</td>
            </tr>
        </tfoot>
    </table>

    <script>
        // 👉 Edit these arrays with your real holdings
        const stockHoldings = [
            { ticker: "AAPL", shares: 50, price: 190.25 },
            { ticker: "MSFT", shares: 30, price: 420.10 },
            { ticker: "JNJ", shares: 40, price: 155.80 }
        ];

        const etfHoldings = [
            { ticker: "VTI", shares: 60, price: 260.40 },
            { ticker: "VXUS", shares: 80, price: 60.10 },
            { ticker: "SCHD", shares: 100, price: 78.50 }
        ];

        function renderTable(data, tableId, totalId) {
            const tbody = document.querySelector(`#${tableId} tbody`);
            const totalEl = document.getElementById(totalId);
            tbody.innerHTML = "";

            let total = 0;

            data.forEach(pos => {
                const row = document.createElement("tr");
                const value = pos.shares * pos.price;
                total += value;

                row.innerHTML = `
                    <td>${pos.ticker}</td>
                    <td>${pos.shares}</td>
                    <td>$${pos.price.toFixed(2)}</td>
                    <td>$${value.toFixed(2)}</td>
                `;
                tbody.appendChild(row);
            });

            totalEl.textContent = `$${total.toFixed(2)}`;
        }

        renderTable(stockHoldings, "stocksTable", "stocksTotal");
        renderTable(etfHoldings, "etfsTable", "etfsTotal");
    </script>
</body>
</html>
